name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: zarathustra-x86_64-unknown-linux-gnu.tgz
          - os: ubuntu-24.04-arm64
            target: aarch64-unknown-linux-gnu
            artifact: zarathustra-aarch64-unknown-linux-gnu.tgz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: zarathustra-x86_64-pc-windows-msvc.tgz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/rustup
        with:
          targets: ${{ matrix.target }}
      - name: Build release binaries
        run: |
          cargo build --release --locked --package zarathustra_cli --target ${{ matrix.target }}
          mkdir -p tmp/pkg
          if [ -f "target/${{ matrix.target }}/release/zarathustra.exe" ]; then
            cp target/${{ matrix.target }}/release/zarathustra.exe tmp/pkg/
          else
            cp target/${{ matrix.target }}/release/zarathustra tmp/pkg/
          fi
        shell: bash
      - name: Package artifacts
        run: |
          cd tmp/pkg
          tar cv * | gzip -9 > ../../${{ matrix.artifact }}
      - uses: svenstaro/upload-release-action@v2
        with:
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.artifact }}

