name: website

on:
  push:
    branches: [main]
    paths:
      - 'zarathustra/web/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.vercel.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy to Vercel
        id: vercel
        run: |
          mkdir -p zarathustra/web/.vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' \
            "${{ secrets.ORGID }}" \
            "prj_VhbnkUsDgGsmsqOLMJ3EpN4T0Cqv" \
            > zarathustra/web/.vercel/project.json
          cd zarathustra/web
          npx --yes vercel@latest deploy --prod \
            --token=${{ secrets.ZARATOKEN }} \
            --scope=${{ secrets.ORGID }} \
            --yes > ../vercel-url.txt
          cd ..
          echo "url=$(cat vercel-url.txt)" >> $GITHUB_OUTPUT
