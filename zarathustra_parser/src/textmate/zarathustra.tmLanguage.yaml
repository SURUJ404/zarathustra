$schema: 'https://raw.githubusercontent.com/martinring/tmlanguage/master/tmlanguage.json'
name: Zarathustra
fileTypes:
    - zara
scopeName: source.zara
patterns:
    -
        comment: attributes
        name: meta.attribute.zarathustra
        begin: '(#)(\!?)(\[)'
        beginCaptures:
            '1':
                name: punctuation.definition.attribute.zarathustra
            '2':
                name: keyword.operator.attribute.inner.zarathustra
            '3':
                name: punctuation.brackets.attribute.zarathustra
        end: '\]'
        endCaptures:
            '0':
                name: punctuation.brackets.attribute.zarathustra
        patterns:
            -
                include: '#block-comments'
            -
                include: '#comments'
            -
                include: '#keywords'
            -
                include: '#punctuation'
            -
                include: '#strings'
            -
                include: '#types'
    -
        include: '#block-comments'
    -
        include: '#comments'
    -
        include: '#constants'
    -
        include: '#functions'
    -
        include: '#types'
    -
        include: '#keywords'
    -
        include: '#punctuation'
    -
        include: '#strings'
    -
        include: '#variables'
repository:
    comments:
        patterns:
            -
                comment: 'line comments'
                name: comment.line.double-slash.zarathustra
                match: '\s*//.*'
    block-comments:
        patterns:
            -
                comment: 'empty block comments'
                name: comment.block.zarathustra
                match: '/\*\*/'
            -
                comment: 'block comments'
                name: comment.block.zarathustra
                begin: '/\*(?!\*)'
                end: '\*/'
                patterns:
                    - {include: '#block-comments'}
    constants:
        patterns:
            -
                comment: 'ALL CAPS constants'
                name: constant.other.caps.zarathustra
                match: '\b[A-Z]{2}[A-Z0-9_]*\b'
            -
                comment: 'decimal integers and floats'
                name: constant.numeric.decimal.zarathustra
                match: '\b\d[\d_]*(?:u16|u32|u64|u8|f)?\b'
            -
                comment: 'hexadecimal integers'
                name: constant.numeric.hex.zarathustra
                match: '\b0x[\da-fA-F_]+\b'
            -
                comment: booleans
                name: constant.language.bool.zarathustra
                match: \b(true|false)\b
    imports:
        patterns:
            -
                comment: 'explicit import statement'
                name: meta.import.explicit.zarathustra
                match: '\b(from)\s+(\".*\")(import)\s+([A-Za-z0-9_]+)\s+((as)\s+[A-Za-z0-9_]+)?\b'
                patterns:
                    - {include: '#block-comments'}
                    - {include: '#comments'}
                    - {include: '#keywords'}
                    - {include: '#punctuation'}
                    - {include: '#types'}
                    - {include: '#strings'}
            -
                comment: 'main import statement'
                name: meta.import.explicit.zarathustra
                match: '\b(import)\s+(\".*\")\s+((as)\s+[A-Za-z0-9_]+)?\b'
                patterns:
                    - {include: '#block-comments'}
                    - {include: '#comments'}
                    - {include: '#keywords'}
                    - {include: '#punctuation'}
                    - {include: '#types'}
                    - {include: '#strings'}
    constant-definitions:
        patterns:
            -
                comment: 'constant definition'
                name: meta.constant.definition.zarathustra
                match: '\b(const)\s+([A-Za-z0-9_]+)\s+([A-Za-z0-9_]+)\s+=\s+(?:.+)\b'
                captures:
                    '1': {name: keyword.other.const.zarathustra}
                    '2': {name: entity.name.type.zarathustra}
                    '3': {name: entity.name.constant.zarathustra}
                patterns:
                    - {include: '#block-comments'}
                    - {include: '#comments'}
                    - {include: '#keywords'}
                    - {include: '#constants'}
                    - {include: '#punctuation'}
                    - {include: '#types'}
                    - {include: '#variables'}
    functions:
        patterns:
            -
                comment: 'function definition'
                name: meta.function.definition.zarathustra
                begin: '\b(def)\s+([A-Za-z0-9_]+)((\()|(<))'
                beginCaptures:
                    '1': {name: keyword.other.def.zarathustra}
                    '2': {name: entity.name.function.zarathustra}
                    '4': {name: punctuation.brackets.round.zarathustra}
                    '5': {name: punctuation.brackets.angle.zarathustra}
                end: '\:|;'
                endCaptures:
                    '0': {name: keyword.punctuation.colon.zarathustra}
                patterns:
                    - {include: '#block-comments'}
                    - {include: '#comments'}
                    - {include: '#keywords'}
                    - {include: '#constants'}
                    - {include: '#functions'}
                    - {include: '#punctuation'}
                    - {include: '#strings'}
                    - {include: '#types'}
                    - {include: '#variables'}
            -
                comment: 'function/method calls, chaining'
                name: meta.function.call.zarathustra
                begin: '([A-Za-z0-9_]+)(\()'
                beginCaptures:
                    '1': {name: entity.name.function.zarathustra}
                    '2': {name: punctuation.brackets.round.zarathustra}
                end: \)
                endCaptures:
                    '0': {name: punctuation.brackets.round.zarathustra}
                patterns:
                    - {include: '#block-comments'}
                    - {include: '#comments'}
                    - {include: '#keywords'}
                    - {include: '#constants'}
                    - {include: '#functions'}
                    - {include: '#punctuation'}
                    - {include: '#strings'}
                    - {include: '#types'}
                    - {include: '#variables'}
            -
                comment: 'function/method calls with turbofish'
                name: meta.function.call.zarathustra
                begin: '([A-Za-z0-9_]+)(?=::<.*>\()'
                beginCaptures:
                    '1': {name: entity.name.function.zarathustra}
                end: \)
                endCaptures:
                    '0': {name: punctuation.brackets.round.zarathustra}
                patterns:
                    - {include: '#block-comments'}
                    - {include: '#comments'}
                    - {include: '#keywords'}
                    - {include: '#constants'}
                    - {include: '#functions'}
                    - {include: '#punctuation'}
                    - {include: '#strings'}
                    - {include: '#types'}
                    - {include: '#variables'}
    keywords:
        patterns:
            -
                comment: 'argument visibility'
                name: keyword.visibility.zarathustra
                match: \b(public|private)\b
            -
                comment: 'control flow keywords'
                name: keyword.control.zarathustra
                match: \b(for|in|if|else|return|assert|log)\b
            -
                comment: 'storage keywords'
                name: storage.type.zarathustra
                match: \b(struct)\b
            -
                comment: 'const keyword'
                name: keyword.other.const.zarathustra
                match: \b(const)\b
            -
                comment: 'type keyword'
                name: keyword.other.type.zarathustra
                match: \b(type)\b
            -
                comment: 'def keyword'
                name: keyword.other.def.zarathustra
                match: \b(def)\b
            -
                comment: 'import keywords'
                name: keyword.other.import.zarathustra
                match: \b(import|from|as)\b
            -
                comment: 'logical operators'
                name: keyword.operator.logical.zarathustra
                match: '(\^|\||\|\||&|&&|<<|>>|!)(?!=)'
            -
                comment: 'mut'
                name: "storage.modifier.mut.zarathustra"
                match: \b(mut)\b
            -
                comment: 'single equal'
                name: keyword.operator.assignment.equal.zarathustra
                match: '(?<![<>])=(?!=|>)'
            -
                comment: 'comparison operators'
                name: keyword.operator.comparison.zarathustra
                match: '(=(=)?(?!>)|!=|<=|(?<!=)>=)'
            -
                comment: 'math operators'
                name: keyword.operator.math.zarathustra
                match: '(([+%]|(\*(?!\w)))(?!=))|(-(?!>))|(/(?!/))'
            -
                comment: 'less than, greater than (special case)'
                match: '(?:\b|(?:(\))|(\])|(\})))[ \t]+([<>])[ \t]+(?:\b|(?:(\()|(\[)|(\{)))'
                captures:
                    '1': {name: punctuation.brackets.round.zarathustra}
                    '2': {name: punctuation.brackets.square.zarathustra}
                    '3': {name: punctuation.brackets.curly.zarathustra}
                    '4': {name: keyword.operator.comparison.zarathustra}
                    '5': {name: punctuation.brackets.round.zarathustra}
                    '6': {name: punctuation.brackets.square.zarathustra}
                    '7': {name: punctuation.brackets.curly.zarathustra}
            -
                comment: 'dot access'
                name: keyword.operator.access.dot.zarathustra
                match: '\.(?!\.)'
            -
                comment: 'ranges, range patterns'
                name: keyword.operator.range.zarathustra
                match: '\.{2}(=|\.)?'
            -
                comment: colon
                name: keyword.operator.colon.zarathustra
                match: ':(?!:)'
            -
                comment: 'dashrocket, skinny arrow'
                name: keyword.operator.arrow.skinny.zarathustra
                match: '->'
    types:
        patterns:
            -
                comment: 'numeric types'
                match: '(?<![A-Za-z])(u16|u32|u64|u8|field)\b'
                captures:
                    '1': {name: entity.name.type.numeric.zarathustra}
            -
                comment: 'parameterized types'
                begin: '\b([A-Z][A-Za-z0-9]*)(<)'
                beginCaptures:
                    '1': {name: entity.name.type.zarathustra}
                    '2': {name: punctuation.brackets.angle.zarathustra}
                end: '>'
                endCaptures:
                    '0': {name: punctuation.brackets.angle.zarathustra}
                patterns:
                    - {include: '#block-comments'}
                    - {include: '#comments'}
                    - {include: '#keywords'}
                    - {include: '#punctuation'}
                    - {include: '#types'}
                    - {include: '#variables'}
            -
                comment: 'primitive types'
                name: entity.name.type.primitive.zarathustra
                match: \b(bool)\b
            -
                comment: 'struct declarations'
                match: '\b(struct)\s+([A-Z][A-Za-z0-9]*)\b'
                captures:
                    '1': {name: storage.type.zarathustra}
                    '2': {name: entity.name.type.struct.zarathustra}
            -
                comment: types
                name: entity.name.type.zarathustra
                match: '\b[A-Z][A-Za-z0-9]*\b(?!!)'
    punctuation:
        patterns:
            -
                comment: comma
                name: punctuation.comma.zarathustra
                match: ','
            -
                comment: 'curly braces'
                name: punctuation.brackets.curly.zarathustra
                match: '[{}]'
            -
                comment: 'parentheses, round brackets'
                name: punctuation.brackets.round.zarathustra
                match: '[()]'
            -
                comment: 'semicolon'
                name: punctuation.semi.zarathustra
                match: ';'
            -
                comment: 'square brackets'
                name: punctuation.brackets.square.zarathustra
                match: '[\[\]]'
            -
                comment: 'angle brackets'
                name: punctuation.brackets.angle.zarathustra
                match: '(?<!=)[<>]'
    strings:
        patterns:
            -
                comment: 'double-quoted strings and byte strings'
                name: string.quoted.double.zarathustra
                begin: '(b?)(")'
                beginCaptures:
                    '1': {name: string.quoted.byte.raw.zarathustra}
                    '2': {name: punctuation.definition.string.zarathustra}
                end: '"'
                endCaptures:
                    '0': {name: punctuation.definition.string.zarathustra}
            -
                comment: 'double-quoted raw strings and raw byte strings'
                name: string.quoted.double.zarathustra
                begin: '(b?r)(#*)(")'
                beginCaptures:
                    '1': {name: string.quoted.byte.raw.zarathustra}
                    '2': {name: punctuation.definition.string.raw.zarathustra}
                    '3': {name: punctuation.definition.string.zarathustra}
                end: '(")(\2)'
                endCaptures:
                    '1': {name: punctuation.definition.string.zarathustra}
                    '2': {name: punctuation.definition.string.raw.zarathustra}
    variables:
        patterns:
            -
                comment: variables
                name: variable.other.zarathustra
                match: '\b(?<!(?<!\.)\.)[a-z0-9_]+\b'
